name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: false
        default: 'dev'

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        run: swift --version

      - name: Build
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Verify app bundle
        run: |
          ls -la HimiRecorder.app/Contents/Resources/
          codesign -dvv HimiRecorder.app 2>&1 || true

      - name: Create DMG
        run: |
          mkdir -p dmg_staging
          cp -R HimiRecorder.app dmg_staging/
          # Create a symlink to /Applications for drag-and-drop install
          ln -s /Applications dmg_staging/Applications
          hdiutil create -volname "HimiRecorder" \
            -srcfolder dmg_staging \
            -ov -format UDZO \
            HimiRecorder.dmg

      - name: Create ZIP
        run: |
          ditto -c -k --sequesterRsrc --keepParent HimiRecorder.app HimiRecorder.app.zip

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Extract changelog for this version
        id: changelog
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          # Extract the section for this version from CHANGELOG.md
          BODY=$(sed -n "/^## \[${VERSION}\]/,/^## \[/{ /^## \[${VERSION}\]/d; /^## \[/d; p; }" CHANGELOG.md 2>/dev/null || echo "")
          if [[ -z "$BODY" ]]; then
            BODY="Release ${VERSION}"
          fi
          # Write to file to preserve newlines
          echo "$BODY" > release_notes.md

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HimiRecorder-${{ steps.version.outputs.tag }}
          path: |
            HimiRecorder.dmg
            HimiRecorder.app.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            HimiRecorder.dmg
            HimiRecorder.app.zip
          body_path: release_notes.md
